<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0e17">
    <meta name="description" content="Democracy Survival Arena - A modern 3D board game where players compete to reach the Democracy Core">
    <title>Democracy Survival Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- REGISTRATION SCREEN -->
    <div id="registration-screen" class="screen active">
        <div class="bg-particles" id="bg-particles"></div>
        <div class="reg-container">
            <div class="title-section">
                <div class="title-glow"></div>
                <h1 class="game-title" id="game-title">
                    <span class="title-line" data-text="DEMOCRACY">DEMOCRACY</span>
                    <span class="title-line sub" data-text="SURVIVAL ARENA">SURVIVAL ARENA</span>
                </h1>
                <p class="tagline">Shape the future. Survive the game.</p>
            </div>

            <div class="reg-card">
                <div class="card-glow"></div>
                <div class="player-count-section">
                    <label class="section-label"><i class="fas fa-users"></i> NUMBER OF PLAYERS</label>
                    <div class="player-count-selector">
                        <button class="count-btn" data-count="2">2</button>
                        <button class="count-btn active" data-count="3">3</button>
                        <button class="count-btn" data-count="4">4</button>
                    </div>
                </div>

                <div class="player-names-section" id="player-names-section">
                    <label class="section-label"><i class="fas fa-id-badge"></i> PLAYER NAMES</label>
                    <div class="names-grid" id="names-grid"></div>
                </div>

                <button class="start-btn" id="start-btn">
                    <span class="btn-bg"></span>
                    <span class="btn-text"><i class="fas fa-play"></i> START GAME</span>
                </button>
            </div>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
        <canvas id="game-canvas"></canvas>

        <!-- HUD Overlay -->
        <div class="hud-overlay">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="game-logo-small">
                    <i class="fas fa-landmark"></i>
                    <span>DEMOCRACY ARENA</span>
                </div>
                <div class="turn-indicator" id="turn-indicator">
                    <div class="turn-dot" id="turn-dot"></div>
                    <span id="turn-text">Player 1's Turn</span>
                </div>
            </div>

            <!-- Player Panels -->
            <div class="players-panel" id="players-panel"></div>

            <!-- Dice Area -->
            <div class="dice-area" id="dice-area">
                <div class="dice-container" id="dice-container">
                    <div class="dice-3d" id="dice-3d">
                        <div class="dice-face front">1</div>
                        <div class="dice-face back">6</div>
                        <div class="dice-face right">3</div>
                        <div class="dice-face left">4</div>
                        <div class="dice-face top">5</div>
                        <div class="dice-face bottom">2</div>
                    </div>
                </div>
                <div class="dice-result" id="dice-result"></div>
                <button class="roll-btn" id="roll-btn">
                    <i class="fas fa-dice"></i> ROLL DICE
                </button>
            </div>

            <!-- Message Area -->
            <div class="message-area" id="message-area"></div>
        </div>

        <!-- Win Screen Overlay -->
        <div class="win-overlay" id="win-overlay">
            <div class="win-content">
                <div class="win-particles"></div>
                <div class="trophy-icon"><i class="fas fa-trophy"></i></div>
                <h2 class="win-title" id="win-title">VICTORY!</h2>
                <p class="win-player" id="win-player">Player 1</p>
                <p class="win-subtitle">has reached the Democracy Core!</p>
                <div class="win-score" id="win-score">Score: 0</div>
                <button class="restart-btn" id="restart-btn">
                    <i class="fas fa-redo"></i> PLAY AGAIN
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/board.js"></script>
    <script src="js/game.js"></script>
    <script src="js/scene.js"></script>
    <script src="js/registration.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
